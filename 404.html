<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Noob to AI Expert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/Noob-to-AI-Expert/assets/css/main.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-content { max-width: 520px; }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .error-emoji { font-size: 3rem; margin-bottom: 1rem; }
    .error-title { font-size: 1.75rem; font-weight: 800; color: var(--text); margin: 0 0 0.75rem; }
    .error-desc { color: var(--text-muted); font-size: 1rem; margin: 0 0 2rem; line-height: 1.7; }
    .error-links { display: flex; flex-direction: column; gap: 0.75rem; align-items: center; }
    .error-link-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: linear-gradient(135deg, #0284c7, #7c3aed);
      color: #fff; padding: 0.8rem 2rem; border-radius: 8px;
      font-weight: 600; text-decoration: none; font-size: 0.95rem;
      box-shadow: 0 4px 14px rgba(2,132,199,0.25);
    }
    .error-link-secondary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); padding: 0.7rem 1.5rem; border-radius: 8px;
      font-weight: 500; text-decoration: none; font-size: 0.9rem;
      box-shadow: var(--shadow-sm); transition: all 0.2s;
    }
    .error-link-secondary:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-2); }
    .code-hint {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
      padding: 0.75rem 1rem; margin: 1.5rem 0;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #94a3b8;
      text-align: left;
    }
    .code-hint span { color: #f87171; }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="error-page">
  <div class="error-content">
    <div class="error-code">404</div>
    <div class="error-emoji">🤖</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">Looks like this page got lost in the embedding space. The URL you requested doesn't exist — or has moved.</p>
    <div class="code-hint">
      <span>KeyError:</span> 'page_not_found'<br>
      → nearest neighbor: <strong style="color:#16a34a;">index.html</strong> (similarity: 0.94)
    </div>
    <div class="error-links">
      <a href="/Noob-to-AI-Expert/" class="error-link-primary"><i class="fas fa-home"></i> Go to Homepage</a>
      <a href="/Noob-to-AI-Expert/sections/beginner.html" class="error-link-secondary"><i class="fas fa-seedling"></i> Start Beginner Track</a>
      <a href="/Noob-to-AI-Expert/sections/intermediate.html" class="error-link-secondary"><i class="fas fa-code"></i> Intermediate Track</a>
      <a href="/Noob-to-AI-Expert/sections/expert.html" class="error-link-secondary"><i class="fas fa-brain"></i> Expert Track</a>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="/Noob-to-AI-Expert/assets/js/main.js"></script>
</body>
</html>
